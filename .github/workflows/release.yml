name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
          - target: aarch64-unknown-linux-gnu

    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compiler (aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu libc6-dev-arm64-cross

      - name: Build binary
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary for release
        run: |
          cp target/${{ matrix.target }}/release/edash edash-${{ matrix.target }}
          chmod +x edash-${{ matrix.target }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: edash-${{ matrix.target }}
          path: edash-${{ matrix.target }}

  release-assets:
    runs-on: ubuntu-22.04
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Gather binaries
        run: |
          mkdir -p release-files
          find artifacts/ -name 'edash-*' -exec cp {} release-files/ \;
          ls release-files/

      - name: Install micromamba (for lock generation)
        run: |
          curl -L micro.mamba.pm/install.sh | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Generate locks for micromamba tools
        shell: python3 {0}
        run: |
          import yaml, subprocess, os, sys

          tools = yaml.safe_load(open('catalog/tools.yaml'))
          os.makedirs('catalog/locks', exist_ok=True)
          generated, failed = 0, 0

          for name, cfg in tools.items():
              if cfg.get('backend') != 'micromamba':
                  continue
              channel = cfg.get('channel', 'conda-forge')
              pkg = cfg.get('package', name)
              prefix = f'/tmp/_edash_lock_{name}'

              # Use primary channel + conda-forge fallback for base libraries
              cmd = [
                  'micromamba', 'create', '-p', prefix,
                  '--override-channels', '--strict-channel-priority',
                  '-c', channel, '-c', 'conda-forge',
                  pkg, '-y', '--quiet'
              ]
              print(f'Resolving {name} ({channel}::{pkg})... ', end='')

              r = subprocess.run(cmd, capture_output=True)
              if r.returncode != 0:
                  failed += 1
                  print(f'SKIPPED (solver failed)')
                  subprocess.run(['rm', '-rf', prefix], capture_output=True)
                  continue

              out = subprocess.check_output([
                  'micromamba', 'list', '-p', prefix, '--explicit'
              ]).decode()
              # Keep only URL lines, add proper @EXPLICIT header
              urls = [l for l in out.split('\n') if l.startswith('http://') or l.startswith('https://')]
              with open(f'catalog/locks/{name}.explicit.txt', 'w') as f:
                  f.write('# Generated by edash CI\n')
                  f.write('# platform: linux-64\n')
                  f.write('@EXPLICIT\n')
                  f.write('\n'.join(urls))
                  f.write('\n')
              subprocess.run(['rm', '-rf', prefix])
              generated += 1
              print(f'done')

          print(f'Generated {generated} lock files, {failed} skipped')
          if generated == 0 and failed > 0:
              print('No locks generated — release would be empty. Check tool channels.')
              sys.exit(1)

      - name: Package catalog
        run: |
          tar -czf catalog.tar.gz -C catalog .
          echo "schema: 1" > manifest.yaml
          echo "catalog_version: $GITHUB_REF_NAME" >> manifest.yaml
          echo "release: $GITHUB_REF_NAME" >> manifest.yaml
          echo "minimum_edash: 0.1.0" >> manifest.yaml
          echo "generated_by: edash-ci" >> manifest.yaml
          echo "generated_at: $(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> manifest.yaml
          echo "files:" >> manifest.yaml
          for f in $(find catalog -type f | sort); do
            hash=$(sha256sum "$f" | cut -d' ' -f1)
            echo "  $f: sha256:$hash" >> manifest.yaml
          done

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-files/*
            catalog.tar.gz
            manifest.yaml
            install.sh
          name: ${{ github.ref_name }}
          generate_release_notes: true
