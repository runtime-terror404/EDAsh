name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
          - target: aarch64-unknown-linux-gnu

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary for release
        run: |
          cp target/${{ matrix.target }}/release/edash edash-${{ matrix.target }}
          chmod +x edash-${{ matrix.target }}

      - name: Upload binary
        uses: softprops/action-gh-release@v2
        with:
          files: edash-${{ matrix.target }}
          name: ${{ github.ref_name }}
          generate_release_notes: true

  release-assets:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Package catalog
        run: |
          tar -czf catalog.tar.gz -C catalog .
          echo "schema: 1" > manifest.yaml
          echo "catalog_version: $GITHUB_REF_NAME" >> manifest.yaml
          echo "release: $GITHUB_REF_NAME" >> manifest.yaml
          echo "minimum_edash: 0.1.0" >> manifest.yaml
          echo "generated_by: edash-ci" >> manifest.yaml
          echo "generated_at: $(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> manifest.yaml
          echo "files:" >> manifest.yaml
          for f in $(find catalog -type f | sort); do
            hash=$(sha256sum "$f" | cut -d' ' -f1)
            echo "  $f: sha256:$hash" >> manifest.yaml
          done

      - name: Upload catalog + manifest + installer
        uses: softprops/action-gh-release@v2
        with:
          files: |
            catalog.tar.gz
            manifest.yaml
            install.sh
          name: ${{ github.ref_name }}
