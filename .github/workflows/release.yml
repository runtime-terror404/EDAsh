name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
          - target: aarch64-unknown-linux-gnu

    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compiler (aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu libc6-dev-arm64-cross

      - name: Build binary
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary for release
        run: |
          cp target/${{ matrix.target }}/release/edash edash-${{ matrix.target }}
          chmod +x edash-${{ matrix.target }}

      - name: Upload binary
        uses: softprops/action-gh-release@v2
        with:
          files: edash-${{ matrix.target }}
          name: ${{ github.ref_name }}
          generate_release_notes: true

  release-assets:
    runs-on: ubuntu-22.04
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install micromamba (for lock generation)
        run: |
          curl -L micro.mamba.pm/install.sh | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          pip3 install --user pyyaml

      - name: Generate locks for micromamba tools
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          mkdir -p catalog/locks
          # Parse tools.yaml, generate explicit lock per micromamba tool
          python3 -c "
          import yaml, subprocess, os
          tools = yaml.safe_load(open('catalog/tools.yaml'))
          for name, cfg in tools.items():
              if cfg['backend'] != 'micromamba':
                  continue
              ch = cfg.get('channel', 'conda-forge')
              pkg = cfg.get('package', name)
              prefix = f'/tmp/_edash_lock_{name}'
              print(f'Resolving {name} ({ch}::{pkg})...')
              subprocess.run([
                  'micromamba', 'create', '-p', prefix,
                  '--override-channels', '--strict-channel-priority',
                  '-c', ch, pkg, '-y', '--quiet'
              ], check=True)
              out = subprocess.check_output([
                  'micromamba', 'list', '-p', prefix,
                  '--explicit', '--md5'
              ])
              with open(f'catalog/locks/{name}.explicit.txt', 'wb') as f:
                  f.write(out)
              subprocess.run(['rm', '-rf', prefix])
          print(f'Generated {len(os.listdir(\"catalog/locks\"))} lock files')
          "

      - name: Package catalog
        run: |
          tar -czf catalog.tar.gz -C catalog .
          echo "schema: 1" > manifest.yaml
          echo "catalog_version: $GITHUB_REF_NAME" >> manifest.yaml
          echo "release: $GITHUB_REF_NAME" >> manifest.yaml
          echo "minimum_edash: 0.1.0" >> manifest.yaml
          echo "generated_by: edash-ci" >> manifest.yaml
          echo "generated_at: $(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> manifest.yaml
          echo "files:" >> manifest.yaml
          for f in $(find catalog -type f | sort); do
            hash=$(sha256sum "$f" | cut -d' ' -f1)
            echo "  $f: sha256:$hash" >> manifest.yaml
          done

      - name: Upload catalog + manifest + installer
        uses: softprops/action-gh-release@v2
        with:
          files: |
            catalog.tar.gz
            manifest.yaml
            install.sh
          name: ${{ github.ref_name }}
